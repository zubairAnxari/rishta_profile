
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 1rem 0; max-width: 680px; }
.section { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
.section-title { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.section-num { display: inline-flex; width: 18px; height: 18px; border-radius: 50%; background: var(--color-background-secondary); align-items: center; justify-content: center; font-size: 10px; color: var(--color-text-secondary); }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 12px; color: var(--color-text-secondary); }
.field input, .field select, .field textarea { font-size: 14px; font-family: var(--font-sans); color: var(--color-text-primary); background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 7px 10px; outline: none; width: 100%; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--color-border-primary); }
.field textarea { resize: vertical; min-height: 60px; }
.full { grid-column: 1 / -1; }

/* Photo upload */
.photo-section { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 1.25rem; }
.photo-circle { width: 80px; height: 80px; border-radius: 50%; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; cursor: pointer; position: relative; }
.photo-circle img { width: 100%; height: 100%; object-fit: cover; display: none; }
.photo-icon { font-size: 28px; color: var(--color-text-tertiary); }
.photo-info { flex: 1; }
.photo-info p { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 8px; line-height: 1.5; }
.btn-upload { padding: 7px 14px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 13px; color: var(--color-text-primary); cursor: pointer; }
.btn-upload:hover { background: var(--color-background-tertiary); }
.photo-name { font-size: 11px; color: var(--color-text-tertiary); margin-top: 4px; }

/* Job toggle */
.toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.toggle-row label { font-size: 13px; color: var(--color-text-secondary); }
.toggle { position: relative; width: 36px; height: 20px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.slider-t { position: absolute; inset: 0; background: var(--color-background-tertiary); border: 0.5px solid var(--color-border-secondary); border-radius: 20px; cursor: pointer; transition: background 0.2s; }
.slider-t:before { content: ''; position: absolute; width: 14px; height: 14px; left: 2px; top: 2px; background: var(--color-text-tertiary); border-radius: 50%; transition: transform 0.2s, background 0.2s; }
.toggle input:checked + .slider-t { background: var(--color-background-info); border-color: var(--color-border-info); }
.toggle input:checked + .slider-t:before { transform: translateX(16px); background: var(--color-text-info); }

/* Courses */
.course-list { display: flex; flex-direction: column; gap: 8px; }
.course-item { display: flex; gap: 8px; align-items: center; }
.course-item input { flex: 1; font-size: 14px; font-family: var(--font-sans); color: var(--color-text-primary); background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 7px 10px; outline: none; }
.course-item input:focus { border-color: var(--color-border-primary); }
.btn-remove { width: 28px; height: 28px; border-radius: 50%; background: none; border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-tertiary); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; line-height: 1; }
.btn-remove:hover { border-color: var(--color-border-danger); color: var(--color-text-danger); }
.btn-add { margin-top: 8px; padding: 7px 14px; background: none; border: 0.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 13px; color: var(--color-text-secondary); cursor: pointer; width: 100%; text-align: left; }
.btn-add:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }

/* Actions */
.actions { display: flex; gap: 10px; margin-top: 1rem; }
.btn-preview { flex: 1; padding: 10px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500; color: var(--color-text-primary); cursor: pointer; }
.btn-preview:hover { background: var(--color-background-tertiary); }
.preview-box { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-top: 1rem; display: none; }
.preview-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 10px; }
.preview-text { font-size: 13px; color: var(--color-text-primary); line-height: 1.8; white-space: pre-wrap; font-family: var(--font-mono); background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 12px; max-height: 360px; overflow-y: auto; }
.btn-copy { padding: 8px 18px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 13px; font-weight: 500; color: var(--color-text-primary); cursor: pointer; margin-top: 10px; }
.btn-copy:hover { background: var(--color-background-secondary); }
.copied { color: var(--color-text-success) !important; }
.photo-note { font-size: 11px; color: var(--color-text-tertiary); margin-top: 6px; }
</style>

<div class="wrap">

  <!-- Photo -->
  <div class="photo-section">
    <div class="photo-circle" onclick="document.getElementById('photoInput').click()">
      <img id="photoPreview" alt="Profile photo" />
      <span class="photo-icon" id="photoIcon">👤</span>
    </div>
    <div class="photo-info">
      <p>Add a profile photo (optional). It will be shown above your message for quick identification.</p>
      <button class="btn-upload" onclick="document.getElementById('photoInput').click()">Choose photo</button>
      <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhoto(event)" />
      <div class="photo-name" id="photoName"></div>
    </div>
  </div>

  <!-- Personal -->
  <div class="section">
    <div class="section-title"><span class="section-num">1</span> Personal information</div>
    <div class="grid3">
      <div class="field"><label>Full name</label><input id="name" placeholder="e.g. Hassan Ali" /></div>
      <div class="field"><label>Gender</label><select id="gender"><option value="">Select</option><option>Male</option><option>Female</option></select></div>
      <div class="field"><label>Age</label><input id="age" type="number" placeholder="30" /></div>
      <div class="field"><label>Marital status</label><select id="marital"><option value="">Select</option><option>Single</option><option>Married</option><option>Divorced</option><option>Widowed</option></select></div>
      <div class="field"><label>Height</label><input id="height" placeholder='e.g. 5.7"' /></div>
    </div>
  </div>

  <!-- Education -->
  <div class="section">
    <div class="section-title"><span class="section-num">2</span> Education</div>
    <div class="grid2">
      <div class="field"><label>Main qualification</label><input id="edu" placeholder="e.g. Graduation, Masters" /></div>
      <div class="field"><label>Field / subject</label><input id="field_edu" placeholder="e.g. Computer Science" /></div>
    </div>
    <div style="margin-top: 12px;">
      <div class="field" style="margin-bottom: 8px;"><label>Extra qualifications / courses</label></div>
      <div class="course-list" id="courseList">
        <div class="course-item">
          <input type="text" placeholder="e.g. AWS Certified Developer" />
          <button class="btn-remove" onclick="removeCourse(this)" title="Remove">×</button>
        </div>
      </div>
      <button class="btn-add" onclick="addCourse()">+ Add another course or qualification</button>
    </div>
  </div>

  <!-- Occupation -->
  <div class="section">
    <div class="section-title"><span class="section-num">3</span> Occupation</div>
    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="noJobToggle" onchange="toggleJob(this)" />
        <span class="slider-t"></span>
      </label>
      <label for="noJobToggle" style="cursor:pointer;">Currently not employed / student / house person</label>
    </div>
    <div id="jobFields" class="grid2">
      <div class="field"><label>Job / Business</label><input id="job" placeholder="e.g. Yarn Broker, Software Engineer" /></div>
      <div class="field"><label>Monthly income (optional)</label><input id="income" placeholder="e.g. 80,000 PKR" /></div>
    </div>
    <div id="noJobFields" style="display:none;">
      <div class="field"><label>Current status</label><select id="noJobStatus"><option value="">Select</option><option>Student</option><option>House person</option><option>Job seeking</option><option>Freelancer</option><option>Own business (starting)</option></select></div>
    </div>
  </div>

  <!-- Religion -->
  <div class="section">
    <div class="section-title"><span class="section-num">4</span> Religion</div>
    <div class="grid3">
      <div class="field"><label>Religion</label><input id="religion" placeholder="e.g. Islam" /></div>
      <div class="field"><label>Sect</label><input id="sect" placeholder="e.g. Sunni" /></div>
      <div class="field"><label>Caste</label><input id="caste" placeholder="e.g. Ansari" /></div>
    </div>
  </div>

  <!-- Residence -->
  <div class="section">
    <div class="section-title"><span class="section-num">5</span> Residence</div>
    <div class="grid3">
      <div class="field"><label>City</label><input id="city" placeholder="e.g. Faisalabad" /></div>
      <div class="field"><label>Area / Address</label><input id="area" placeholder="e.g. GM Abad" /></div>
      <div class="field"><label>Home</label><select id="home"><option value="">Select</option><option>Own</option><option>On rent</option></select></div>
      <div class="field"><label>Property size</label><input id="propsize" placeholder="e.g. 2 Marla + plots" /></div>
      <div class="field"><label>Nationality</label><input id="nationality" placeholder="e.g. Pakistani" /></div>
    </div>
  </div>

  <!-- Family -->
  <div class="section">
    <div class="section-title"><span class="section-num">6</span> Family</div>
    <div class="grid2">
      <div class="field"><label>Father's occupation</label><input id="father" placeholder="e.g. Retired, Business" /></div>
      <div class="field"><label>Mother's occupation</label><input id="mother" placeholder="e.g. Housewife" /></div>
      <div class="field full"><label>Brothers (count &amp; detail)</label><input id="brothers" placeholder="e.g. 3 brothers — 1 UK, 2 own software house, 1 school" /></div>
      <div class="field full"><label>Sisters (count &amp; detail)</label><input id="sisters" placeholder="e.g. 2 sisters — 1 married, 1 studying" /></div>
    </div>
  </div>

  <!-- Requirements -->
  <div class="section">
    <div class="section-title"><span class="section-num">7</span> Requirements (rishta)</div>
    <div class="grid3">
      <div class="field"><label>Age range</label><input id="req_age" placeholder="e.g. 21–25" /></div>
      <div class="field"><label>Height range</label><input id="req_height" placeholder='e.g. 5.5"–5.7"' /></div>
      <div class="field"><label>Preferred cities</label><input id="req_city" placeholder="e.g. Lahore, Faisalabad" /></div>
      <div class="field"><label>Caste preference</label><input id="req_cast" placeholder="e.g. Any" /></div>
      <div class="field"><label>Qualification</label><input id="req_edu" placeholder="e.g. Well educated" /></div>
      <div class="field full"><label>Other requirements</label><textarea id="req_other" placeholder="e.g. Noble and decent family, working/non-working..."></textarea></div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-preview" onclick="generatePreview()">Generate WhatsApp message ↓</button>
  </div>

  <div class="preview-box" id="previewBox">
    <div class="preview-title">WhatsApp message preview</div>
    <div class="preview-text" id="previewText"></div>
    <p class="photo-note" id="photoNote" style="display:none;">📎 Photo will be sent separately as an image.</p>
    <button class="btn-copy" id="copyBtn" onclick="copyText()">Copy message</button>
  </div>
</div>

<script>
function v(id) { return document.getElementById(id)?.value?.trim() || ''; }
function line(emoji, label, val) { if (!val) return ''; return `${emoji} *${label}:* ${val}\n`; }

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = document.getElementById('photoPreview');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('photoIcon').style.display = 'none';
  };
  reader.readAsDataURL(file);
  document.getElementById('photoName').textContent = file.name;
}

function toggleJob(cb) {
  document.getElementById('jobFields').style.display = cb.checked ? 'none' : 'grid';
  document.getElementById('noJobFields').style.display = cb.checked ? 'block' : 'none';
}

function addCourse() {
  const list = document.getElementById('courseList');
  const item = document.createElement('div');
  item.className = 'course-item';
  item.innerHTML = `<input type="text" placeholder="e.g. Google Project Management Certificate" /><button class="btn-remove" onclick="removeCourse(this)" title="Remove">×</button>`;
  list.appendChild(item);
  item.querySelector('input').focus();
}

function removeCourse(btn) {
  const list = document.getElementById('courseList');
  if (list.children.length === 1) { btn.closest('.course-item').querySelector('input').value = ''; return; }
  btn.closest('.course-item').remove();
}

function getCourses() {
  return Array.from(document.querySelectorAll('#courseList .course-item input'))
    .map(i => i.value.trim()).filter(Boolean);
}

function generatePreview() {
  const noJob = document.getElementById('noJobToggle').checked;
  const courses = getCourses();
  const hasPhoto = document.getElementById('photoPreview').style.display === 'block';

  let eduBlock = [
    line('🎓', 'Qualification', v('edu')),
    line('📚', 'Field', v('field_edu')),
  ].filter(Boolean).join('');

  if (courses.length) {
    eduBlock += `📜 *Courses / Extra Qualifications:*\n`;
    courses.forEach((c, i) => { eduBlock += `   ${i+1}. ${c}\n`; });
  }

  const occBlock = noJob
    ? line('🔍', 'Current Status', v('noJobStatus'))
    : [line('💼', 'Job / Business', v('job')), v('income') ? line('💰', 'Income', v('income')) : ''].filter(Boolean).join('');

  const sections = [
    ['1️⃣', 'PERSONAL INFORMATION', [
      line('👤', 'Name', v('name')),
      line('⚧', 'Gender', v('gender')),
      line('🎂', 'Age', v('age') ? v('age') + ' years' : ''),
      line('💍', 'Marital Status', v('marital')),
      line('📏', 'Height', v('height')),
    ].filter(Boolean).join('')],
    ['2️⃣', 'EDUCATION DETAILS', eduBlock],
    ['3️⃣', 'OCCUPATION DETAIL', occBlock],
    ['4️⃣', 'RELIGION DETAILS', [
      line('🕌', 'Religion', v('religion')),
      line('📿', 'Sect', v('sect')),
      line('🏷️', 'Cast', v('caste')),
    ].filter(Boolean).join('')],
    ['5️⃣', 'RESIDENCE DETAILS', [
      line('🏠', 'Home', v('home') + (v('propsize') ? ' — ' + v('propsize') : '')),
      line('📍', 'City', v('city')),
      line('🗺️', 'Area', v('area')),
      line('🌍', 'Nationality', v('nationality')),
    ].filter(Boolean).join('')],
    ['6️⃣', 'FAMILY DETAILS', [
      line('👨', "Father's Job", v('father')),
      line('👩', "Mother's Job", v('mother')),
      v('brothers') ? line('👦', 'Brothers', v('brothers')) : '',
      v('sisters') ? line('👧', 'Sisters', v('sisters')) : '',
    ].filter(Boolean).join('')],
    ['7️⃣', 'YOUR REQUIREMENTS', [
      line('📅', 'Age Limit', v('req_age')),
      line('📐', 'Height', v('req_height')),
      line('🏙️', 'City', v('req_city')),
      line('🏷️', 'Cast', v('req_cast')),
      line('🎓', 'Qualification', v('req_edu')),
      v('req_other') ? line('📋', 'Other', v('req_other')) : '',
    ].filter(Boolean).join('')],
  ];

  let msg = sections.filter(([,, body]) => body.trim()).map(([num, title, body]) => `${num} *${title}*\n${body}`).join('\n');

  if (!msg.trim()) msg = 'Fill in the form above to generate your message.';

  document.getElementById('previewText').textContent = msg.trim();
  const note = document.getElementById('photoNote');
  note.style.display = hasPhoto ? 'block' : 'none';
  const box = document.getElementById('previewBox');
  box.style.display = 'block';
  box.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.getElementById('copyBtn').textContent = 'Copy message';
  document.getElementById('copyBtn').classList.remove('copied');
}

function copyText() {
  const text = document.getElementById('previewText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy message'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
